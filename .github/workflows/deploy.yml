name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify Pages is enabled
        run: echo "Deploying to GitHub Pages via Actions"
      - run: npm ci
      - name: Build for GitHub Pages preview
        run: npm run build
        env:
          # Remove these env vars when www.alexandreinteriors.com DNS points to GitHub Pages.
          ASTRO_BASE: /AlexandreInteriorsGit
          ASTRO_SITE: https://alexandreliaume-debug.github.io/AlexandreInteriorsGit
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
